name: publish

# Publishes chaos-search to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — configure the trusted publisher for this
# repo + workflow at https://pypi.org/manage/project/chaos-search/settings/publishing/
# (no API token needed). Run manually first via "Run workflow" to smoke-test.
#
# NOTE: the extension links ONNX Runtime, which is downloaded per-platform
# (scripts/ci_fetch_onnxruntime.sh) and bundled into each wheel by cibuildwheel's
# repair step, so end users need no system ONNX Runtime. The ORT version,
# manylinux image, and CHAOS_ARCH baseline below may need tuning on the first run.

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  ORT_VERSION: "1.20.1"

jobs:
  wheels:
    name: wheels · ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    label: linux-x86_64,  arch: "x86-64-v2" }
          - { os: ubuntu-24.04-arm, label: linux-aarch64, arch: "armv8-a" }
          - { os: macos-14,         label: macos-arm64,   arch: "armv8-a" }
          # Intel-Mac wheels are intentionally not built (GitHub retired the
          # macos-13 Intel runner). To re-add, use label macos-15-intel:
          # - { os: macos-15-intel, label: macos-x86_64,  arch: "x86-64-v2" }
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          # A portable -march baseline per platform (never -march=native for a
          # distributed wheel). ORT is fetched to /tmp/ort by before-all and its
          # lib is put on the loader path so the repair step can vendor it.
          # MACOSX_DEPLOYMENT_TARGET matches ONNX Runtime's macOS floor (13.3 for
          # 1.20.x) so delocate can bundle its dylib; ignored on Linux.
          CIBW_ENVIRONMENT: >-
            ORT_VERSION=${{ env.ORT_VERSION }}
            ORT_ROOT=/tmp/ort
            CMAKE_ARGS="-DORT_ROOT=/tmp/ort -DCHAOS_ARCH=${{ matrix.arch }}"
            LD_LIBRARY_PATH=/tmp/ort/lib
            DYLD_LIBRARY_PATH=/tmp/ort/lib
            MACOSX_DEPLOYMENT_TARGET=13.3

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.label }}
          path: wheelhouse/*.whl

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        # For a dry run, publish to TestPyPI instead:
        # with:
        #   repository-url: https://test.pypi.org/legacy/
