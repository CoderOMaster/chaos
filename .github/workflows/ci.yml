name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: build + test (core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Core library + benchmarks + tests have no external dependencies.
      # The ONNX MiniLM path is opt-in (-DCHAOS_ONNX=ON) and not exercised here.
      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure
